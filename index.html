<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🗼 Paris & London — French Survival Guide</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy:   #0f1e3d;
      --navy2:  #1a3260;
      --gold:   #c9a84c;
      --gold2:  #e8c96d;
      --cream:  #f5f0e8;
      --red:    #c0392b;
      --green:  #27ae60;
      --muted:  #6b7a99;
      --border: rgba(201,168,76,0.28);
      --card:   rgba(255,255,255,0.06);
      --ease:   0.35s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, var(--navy) 0%, #1a2a5e 55%, #0d1b3e 100%);
      min-height: 100vh;
      color: var(--cream);
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── HEADER ─────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.65rem 1.75rem;
      background: rgba(0,0,0,0.28);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .h-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      color: var(--gold);
      font-weight: 700;
      white-space: nowrap;
    }

    .h-sub {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .progress-wrap { flex: 1; max-width: 260px; }

    .progress-label {
      font-size: 0.68rem;
      color: var(--muted);
      text-align: center;
      margin-bottom: 0.25rem;
    }

    .progress-bar {
      height: 4px;
      background: rgba(255,255,255,0.1);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 999px;
      transition: width var(--ease);
    }

    .h-btns { display:flex; gap:0.4rem; margin-left:auto; }

    .h-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--cream);
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .h-btn:hover { background: rgba(201,168,76,0.18); border-color: var(--gold); }
    .h-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 600; }

    /* ── SLIDES ──────────────────────────────── */
    .slides-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 52% 48%;
      opacity: 0;
      transform: translateX(50px);
      transition: opacity var(--ease), transform var(--ease);
      pointer-events: none;
    }

    .slide.active {
      opacity: 1;
      transform: translateX(0);
      pointer-events: all;
    }

    .slide.exit { opacity:0; transform: translateX(-50px); }

    /* ── LEFT PANEL ──────────────────────────── */
    .s-left {
      display: flex;
      flex-direction: column;
      padding: 1.4rem 1.5rem 1rem 2rem;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: rgba(201,168,76,0.13);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.66rem;
      font-weight: 700;
      padding: 0.25rem 0.65rem;
      border-radius: 999px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      width: fit-content;
      margin-bottom: 0.65rem;
    }

    .title-fr {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
    }

    .title-en {
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.15rem;
      margin-bottom: 0.9rem;
    }

    /* Hero image */
    .hero {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      border-radius: 12px;
      overflow: hidden;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .hero video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
    }

    .hero img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      position: relative;
      z-index: 2;
      animation-duration: 9s;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
    }

    @keyframes kb-right {
      from { transform: scale(1.0) translate(0%, 0%); }
      to   { transform: scale(1.18) translate(-5%, -2%); }
    }
    @keyframes kb-left {
      from { transform: scale(1.0) translate(0%, 0%); }
      to   { transform: scale(1.18) translate(5%, 2%); }
    }
    @keyframes kb-zoom {
      from { transform: scale(1.0) translate(0%, 1%); }
      to   { transform: scale(1.20) translate(0%, -1%); }
    }
    @keyframes kb-upleft {
      from { transform: scale(1.0) translate(0%, 0%); }
      to   { transform: scale(1.16) translate(4%, 4%); }
    }

    /* Each slide gets its own direction + focal point */
    .hero-0 img { animation-name: kb-right;  transform-origin: 55% 45%; } /* airport  */
    .hero-1 img { animation-name: kb-left;   transform-origin: 45% 50%; } /* hotel    */
    .hero-2 img { animation-name: kb-zoom;   transform-origin: 60% 30%; } /* lost     */
    .hero-3 img { animation-name: kb-right;  transform-origin: 65% 55%; } /* café     */
    .hero-4 img { animation-name: kb-upleft; transform-origin: 50% 50%; } /* phrases  */
    .hero-5 img { animation-name: kb-zoom;   transform-origin: 50% 40%; } /* chunnel  */
    .hero-6 img { animation-name: kb-left;   transform-origin: 50% 55%; } /* border   */
    .hero-7 img { animation-name: kb-zoom;   transform-origin: 55% 50%; } /* meme     */
    .hero-8 img { animation-name: kb-right;  transform-origin: 40% 60%; } /* late     */
    .hero-9 img { animation-name: kb-upleft; transform-origin: 55% 45%; } /* tired    */

    .hero-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-size: 2.8rem;
      color: var(--gold);
      opacity: 0.4;
      gap: 0.4rem;
    }

    .hero-placeholder small {
      font-size: 0.75rem;
      font-family: 'Inter', sans-serif;
      color: var(--muted);
      opacity: 1;
    }

    /* Question overlay on image */
    .hero-question {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 3;
      padding: 0.5rem 0.85rem;
      background: linear-gradient(transparent, rgba(15,30,61,0.88));
      font-size: 0.72rem;
      color: var(--gold2);
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    /* Expand row */
    .expand-row {
      display: flex;
      gap: 0.5rem;
      margin-top: 0.75rem;
      flex-shrink: 0;
    }

    .expand-btn {
      flex: 1;
      padding: 0.45rem 0.7rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: rgba(245,240,232,0.7);
      font-family: 'Inter', sans-serif;
      font-size: 0.73rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      text-align: left;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .expand-btn:hover { border-color: var(--gold); color: var(--cream); background: rgba(201,168,76,0.1); }
    .expand-btn.open { border-color: var(--gold); color: var(--gold); }

    .expand-content {
      display: none;
      font-size: 0.8rem;
      line-height: 1.6;
      color: rgba(245,240,232,0.82);
      padding: 0.75rem 0.85rem;
      border-radius: 8px;
      margin-top: 0.4rem;
      font-style: italic;
    }

    .expand-content.funny-bg {
      background: rgba(192,57,43,0.12);
      border: 1px solid rgba(192,57,43,0.3);
    }

    .expand-content.tip-bg {
      background: rgba(39,174,96,0.1);
      border: 1px solid rgba(39,174,96,0.25);
      font-style: normal;
    }

    .expand-content.show { display: block; }

    /* ── RIGHT PANEL ─────────────────────────── */
    .s-right {
      display: flex;
      flex-direction: column;
      padding: 1.4rem 2rem 1rem 1.5rem;
      overflow: hidden;
    }

    .phrases-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.75rem;
      flex-shrink: 0;
    }

    .phrases-hdr-label {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .score-badge {
      font-size: 0.72rem;
      color: var(--gold);
      font-weight: 600;
      background: rgba(201,168,76,0.12);
      border: 1px solid var(--border);
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      transition: all 0.3s;
    }

    .score-badge.complete {
      background: var(--gold);
      color: var(--navy);
    }

    /* Quiz hint */
    .quiz-hint {
      font-size: 0.66rem;
      color: var(--gold);
      margin-bottom: 0.5rem;
      text-align: right;
      flex-shrink: 0;
      min-height: 1rem;
    }

    /* Phrase cards */
    .phrases-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex: 1;
      overflow: hidden;
    }

    .phrase-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.7rem 0.9rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s, transform 0.15s;
      flex: 1;
    }

    .phrase-card:hover {
      background: rgba(201,168,76,0.1);
      border-color: rgba(201,168,76,0.55);
      transform: translateX(2px);
    }

    .phrase-card.collected {
      border-color: var(--gold);
      background: rgba(201,168,76,0.12);
    }

    .phrase-card.quiz-hidden .p-fr {
      filter: blur(7px);
      user-select: none;
      transition: filter 0.25s;
    }

    .phrase-card.quiz-hidden:hover .p-fr { filter: blur(0); }
    .phrase-card.quiz-hidden .p-pron { visibility: hidden; }

    .phrase-card.speaking {
      border-color: var(--gold2);
      background: rgba(201,168,76,0.18);
    }

    .p-body { flex: 1; min-width: 0; }

    .p-fr {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      transition: filter 0.25s;
    }

    .p-en {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 0.1rem;
    }

    .p-pron {
      font-size: 0.68rem;
      color: var(--gold);
      font-style: italic;
      margin-top: 0.08rem;
    }

    .p-right {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--gold);
      color: var(--navy);
      font-size: 0.65rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .phrase-card.collected .check { opacity: 1; }

    .speak-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: rgba(201,168,76,0.08);
      color: var(--gold);
      font-size: 0.9rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
      flex-shrink: 0;
    }

    .speak-btn:hover { background: var(--gold); color: var(--navy); border-color: var(--gold); transform: scale(1.1); }

    .speak-btn.playing {
      background: var(--gold);
      color: var(--navy);
      animation: pulse 0.9s infinite;
    }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.18); }
    }

    /* Speak all */
    .speak-all {
      margin-top: 0.6rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--gold);
      background: rgba(201,168,76,0.08);
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.45rem;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .speak-all:hover { background: var(--gold); color: var(--navy); }

    /* ── NAV ─────────────────────────────────── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 2rem;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.18);
      flex-shrink: 0;
    }

    .nav-btn {
      padding: 0.5rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--cream);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .nav-btn:hover:not(:disabled) { background: rgba(201,168,76,0.18); border-color: var(--gold); color: var(--gold); }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .nav-btn.gold { background: var(--gold); color: var(--navy); border-color: var(--gold); }
    .nav-btn.gold:hover:not(:disabled) { background: var(--gold2); }

    .dots { display:flex; gap:0.45rem; align-items:center; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.18);
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active { background: var(--gold); width: 22px; border-radius: 999px; }
    .dot:hover:not(.active) { background: rgba(201,168,76,0.45); }

    /* ── OVERLAYS ────────────────────────────── */
    #voice-toast {
      position: fixed;
      top: 0.75rem;
      right: 0.75rem;
      background: rgba(15,30,61,0.92);
      border: 1px solid var(--gold);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      font-size: 0.72rem;
      color: var(--gold);
      display: none;
      z-index: 100;
      pointer-events: none;
    }

    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .overlay.show { display: flex; }

    .ov-card {
      background: var(--navy2);
      border: 1px solid var(--gold);
      border-radius: 16px;
      padding: 1.75rem;
      max-width: 580px;
      width: 100%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .ov-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 0.85rem;
    }

    .ref-table { width:100%; border-collapse:collapse; font-size:0.82rem; }

    .ref-table th {
      text-align: left;
      padding: 0.45rem 0.65rem;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.67rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .ref-table td {
      padding: 0.55rem 0.65rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      vertical-align: middle;
    }

    .ref-table td:first-child { color: var(--muted); font-size: 0.75rem; }
    .ref-table td:nth-child(2) { font-weight: 600; color: #fff; }
    .ref-table td:nth-child(3) { color: var(--gold); font-style: italic; font-size: 0.75rem; }

    .ref-speak { background:none; border:none; color:var(--gold); cursor:pointer; font-size:0.95rem; }

    .ov-close {
      margin-top: 1.25rem;
      padding: 0.55rem 1.25rem;
      border-radius: 8px;
      border: 1px solid var(--gold);
      background: transparent;
      color: var(--gold);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
    }

    .ov-close:hover { background: var(--gold); color: var(--navy); }

    /* ── BUBBLE SCENE SLIDES ─────────────────── */
    .slide.is-bubble { display: flex; flex-direction: column; grid-template-columns: unset; }

    .bubble-canvas {
      position: relative;
      width: 100%;
      flex: 1;
      overflow: hidden;
    }

    .bubble-canvas img { width:100%; height:100%; object-fit:cover; display:block; }

    .bc-dim {
      position: absolute;
      inset: 0;
      background: rgba(10,20,50,0.2);
      pointer-events: none;
    }

    .bubble-topbar {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 0.65rem 1.1rem;
      background: linear-gradient(rgba(10,20,50,0.72), transparent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 5;
      pointer-events: none;
    }

    .bt-label {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
    }

    .bt-score {
      background: rgba(201,168,76,0.18);
      border: 1px solid var(--gold);
      color: var(--gold);
      font-size: 0.68rem;
      font-weight: 700;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      transition: all 0.35s;
    }

    .bt-score.done { background: var(--gold); color: var(--navy); }

    .bubble-hint {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: 0.45rem 1rem;
      background: linear-gradient(transparent, rgba(10,20,50,0.72));
      font-size: 0.7rem;
      color: rgba(201,168,76,0.88);
      text-align: center;
      pointer-events: none;
      z-index: 5;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Speech bubbles */
    .speech-bubble {
      position: absolute;
      background: rgba(255,255,255,0.93);
      border-radius: 14px;
      padding: 7px 28px 7px 11px;
      min-width: 110px;
      max-width: 190px;
      cursor: pointer;
      box-shadow: 0 4px 18px rgba(0,0,0,0.3);
      z-index: 10;
      opacity: 0;
      transform: scale(0.72) translateY(8px);
      animation: bubblePop 0.38s forwards;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      user-select: none;
      border: 1.5px solid rgba(255,255,255,0.4);
    }

    @keyframes bubblePop { to { opacity:1; transform: scale(1) translateY(0); } }

    .speech-bubble:hover { transform: scale(1.08) !important; box-shadow: 0 7px 26px rgba(0,0,0,0.42); }

    .speech-bubble.heard {
      background: rgba(201,168,76,0.14);
      border-color: rgba(201,168,76,0.5);
    }

    .speech-bubble.speaking {
      background: rgba(201,168,76,0.92);
      border-color: var(--gold);
    }

    .b-icon {
      position: absolute;
      top: 5px; right: 8px;
      font-size: 0.7rem;
      color: var(--gold);
      transition: color 0.2s;
    }

    .speech-bubble.speaking .b-icon { color: var(--navy); }

    .b-fr { font-weight:700; color:#0f1e3d; font-size:0.8rem; line-height:1.3; }
    .b-en { color:#6b7a99; font-size:0.65rem; font-style:italic; margin-top:2px; line-height:1.2; }
    .speech-bubble.speaking .b-en { color: rgba(15,30,61,0.65); }

    /* Tails */
    .speech-bubble::before { content:''; position:absolute; width:0; height:0; }

    .speech-bubble.tail-r::before {
      right:-9px; top:50%; transform:translateY(-50%);
      border-top:8px solid transparent; border-bottom:8px solid transparent;
      border-left:9px solid rgba(255,255,255,0.93);
    }
    .speech-bubble.tail-l::before {
      left:-9px; top:50%; transform:translateY(-50%);
      border-top:8px solid transparent; border-bottom:8px solid transparent;
      border-right:9px solid rgba(255,255,255,0.93);
    }
    .speech-bubble.tail-up::before {
      top:-9px; left:16px;
      border-left:8px solid transparent; border-right:8px solid transparent;
      border-bottom:9px solid rgba(255,255,255,0.93);
    }
    .speech-bubble.tail-down::before {
      bottom:-9px; left:16px;
      border-left:8px solid transparent; border-right:8px solid transparent;
      border-top:9px solid rgba(255,255,255,0.93);
    }

    /* Speaking tail colours */
    .speech-bubble.speaking.tail-r::before    { border-left-color:   rgba(201,168,76,0.92); }
    .speech-bubble.speaking.tail-l::before    { border-right-color:  rgba(201,168,76,0.92); }
    .speech-bubble.speaking.tail-up::before   { border-bottom-color: rgba(201,168,76,0.92); }

    { fr: "Où est l'arrêt de bus?", en: "Where is the bus stop?", top: 75, left: 6, tail: "up" },
    { fr: "Vite, s'il vous plaît!", en: "Hurry, please!", top: 18, left: 62, tail: "l" },
  ],
  [ // 9 — Sleep Deprived
    { fr: "Je suis épuisé(e).", en: "I'm exhausted.", top: 10, left: 8, tail: "down" },
    { fr: "Je n'ai pas dormi.", en: "I haven't slept.", top: 40, left: 8, tail: "r" },
    { fr: "Un double espresso, s'il vous plaît.", en: "Double espresso, please.", top: 70, left: 8, tail: "up" },
    { fr: "Je suis très fatigué(e).", en: "I'm very tired.", top: 15, left: 58, tail: "l" },
    { fr: "Pouvez-vous répéter?", en: "Can you repeat that?", top: 55, left: 58, tail: "l" },
  ],
];

const TOTAL_SLIDES = SLIDES.length * 2; // 20 — alternating phrase / scene

// ═══════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════
let current = 0;
let quizMode = false;
let scores       = SLIDES.map(() => new Set());
let heardBubbles = SLIDES.map(() => new Set());

// ═══════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════
function speak(text, btn) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'fr-FR';
  utt.rate = 0.8;

  const toast = document.getElementById('voice-toast');
  document.querySelectorAll('.speak-btn').forEach(b => b.classList.remove('playing'));
  if (btn) btn.classList.add('playing');
  toast.textContent = `🔊 "${text}"`;
  toast.style.display = 'block';

  utt.onend = utt.onerror = () => {
    if (btn) btn.classList.remove('playing');
    toast.style.display = 'none';
  };

  window.speechSynthesis.speak(utt);
}

function speakAll(si) {
  window.speechSynthesis.cancel();
  const phrases = SLIDES[si].phrases;
  let i = 0;
  const toast = document.getElementById('voice-toast');

  const next = () => {
    if (i >= phrases.length) { toast.style.display = 'none'; return; }
    const utt = new SpeechSynthesisUtterance(phrases[i].fr);
    utt.lang = 'fr-FR';
    utt.rate = 0.78;
    toast.textContent = `🔊 ${i+1}/${phrases.length}: "${phrases[i].fr}"`;
    toast.style.display = 'block';
    utt.onend = () => { i++; setTimeout(next, 550); };
    window.speechSynthesis.speak(utt);
  };
  next();
}

// ═══════════════════════════════════════════
// BUBBLE HEARING
// ═══════════════════════════════════════════
function hearBubble(si, bi, el) {
  window.speechSynthesis.cancel();
  document.querySelectorAll(`#slide-${si*2+1} .speech-bubble`).forEach(b => b.classList.remove('speaking'));
  el.classList.add('speaking', 'heard');
  const text = BUBBLE_DATA[si][bi].fr;
  const utt  = new SpeechSynthesisUtterance(text);
  utt.lang   = 'fr-FR';
  utt.rate   = 0.8;
  const toast = document.getElementById('voice-toast');
  toast.textContent = `🔊 "${text}"`;
  toast.style.display = 'block';
  utt.onend = utt.onerror = () => { el.classList.remove('speaking'); toast.style.display = 'none'; };
  window.speechSynthesis.speak(utt);
  heardBubbles[si].add(bi);
  const scoreEl = document.getElementById(`bscore-${si}`);
  if (scoreEl) {
    const n = heardBubbles[si].size, total = BUBBLE_DATA[si].length;
    scoreEl.textContent = `Heard ${n} / ${total}`;
    if (n >= total) scoreEl.classList.add('done');
  }
}

// ═══════════════════════════════════════════
// COLLECT (tap a phrase card)
// ═══════════════════════════════════════════
function collectPhrase(si, pi, btn) {
  scores[si].add(pi);
  const card = btn.closest('.phrase-card');
  card.classList.add('collected');
  speak(SLIDES[si].phrases[pi].fr, card.querySelector('.speak-btn'));
  updateScore(si);
}

function updateScore(si) {
  const el = document.getElementById(`score-${si}`);
  if (!el) return;
  const n = scores[si].size;
  const total = SLIDES[si].phrases.length;
  el.textContent = `✓ ${n} / ${total}`;
  if (n >= total) el.classList.add('complete');
  else el.classList.remove('complete');
}

// ═══════════════════════════════════════════
// EXPAND TOGGLE
// ═══════════════════════════════════════════
function toggle(id, btn) {
  const el = document.getElementById(id);
  const open = el.classList.toggle('show');
  btn.classList.toggle('open', open);
}

// ═══════════════════════════════════════════
// BUILD SLIDES
// ═══════════════════════════════════════════
function buildSlide(slide, si) {
  const div = document.createElement('div');
  div.className = 'slide' + (si === 0 ? ' active' : '');
  div.id = `slide-${si * 2}`; // even IDs = phrase slides

  const phraseCards = slide.phrases.map((p, pi) => `
    <div class="phrase-card" id="card-${si}-${pi}" onclick="collectPhrase(${si},${pi},this)">
      <div class="p-body">
        <div class="p-fr">${p.fr}</div>
        <div class="p-en">${p.en}</div>
        <div class="p-pron">${p.pron}</div>
      </div>
      <div class="p-right">
        <div class="check">✓</div>
        <button class="speak-btn" onclick="event.stopPropagation(); speak('${p.fr.replace(/'/g,"\\'")}', this)" title="Hear it">🔊</button>
      </div>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="s-left">
      <div class="badge">${slide.badge}</div>
      <div class="title-fr">${slide.fr}</div>
      <div class="title-en">${slide.en}</div>
      <div class="hero hero-${si}">
        ${slide.video
          ? `<video autoplay loop muted playsinline><source src="${slide.video}" type="video/mp4"></video>`
          : `<img src="${slide.img}" alt="${slide.fr}" onerror="this.style.display='none'">`
        }
        <div class="hero-placeholder">${slide.emoji}<small>Image loading...</small></div>
        <div class="hero-question">${slide.question}</div>
      </div>
      <div class="expand-row">
        <button class="expand-btn" onclick="toggle('funny-${si}', this)">🔥 Senior Moment</button>
        <button class="expand-btn" onclick="toggle('tip-${si}', this)">🎯 Pro Tip</button>
      </div>
      <div class="expand-content funny-bg" id="funny-${si}">${slide.funny}</div>
      <div class="expand-content tip-bg" id="tip-${si}">${slide.tip}</div>
    </div>
    <div class="s-right">
      <div class="phrases-hdr">
        <span class="phrases-hdr-label">Key Phrases — tap to collect</span>
        <span class="score-badge" id="score-${si}">✓ 0 / ${slide.phrases.length}</span>
      </div>
      <div class="quiz-hint" id="qhint-${si}" style="visibility:hidden">👆 Hover card to reveal French</div>
      <div class="phrases-list">${phraseCards}</div>
      <button class="speak-all" onclick="speakAll(${si})">🔊 Hear All in French</button>
    </div>
  `;
  return div;
}

function buildQuickRef() {
  const tbody = document.getElementById('ref-body');
  QUICK_REF.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.sit}</td>
      <td>${r.fr}</td>
      <td>${r.pron}</td>
      <td><button class="ref-speak" onclick="speak('${r.fr.replace(/'/g,"\\'")}',null)">🔊</button></td>
    `;
    tbody.appendChild(tr);
  });
}

// ═══════════════════════════════════════════
// BUILD BUBBLE (SCENE) SLIDE
// ═══════════════════════════════════════════
function buildBubbleSlide(slide, si) {
  const div = document.createElement('div');
  div.className = 'slide is-bubble';
  div.id = `slide-${si * 2 + 1}`; // odd IDs = scene slides

  const bubblesHtml = BUBBLE_DATA[si].map((b, bi) => `
    <div class="speech-bubble tail-${b.tail}"
         style="top:${b.top}%;left:${b.left}%;animation-delay:${(0.1 + bi * 0.16).toFixed(2)}s"
         onclick="hearBubble(${si},${bi},this)">
      <span class="b-icon">🔊</span>
      <div class="b-fr">${b.fr}</div>
      <div class="b-en">${b.en}</div>
    </div>
  `).join('');

  div.innerHTML = `
    <div class="bubble-canvas">
      ${slide.img.endsWith('.mp4') ? `<video autoplay muted loop playsinline style="width:100%;height:100%;object-fit:cover;display:block"><source src="${slide.img}" type="video/mp4"></video>` : `<img src="${slide.img}" alt="${slide.fr}">`}
      <div class="bc-dim"></div>
      <div class="bubble-topbar">
        <span class="bt-label">${slide.emoji} ${slide.fr} — Scene</span>
        <span class="bt-score" id="bscore-${si}">Heard 0 / ${BUBBLE_DATA[si].length}</span>
      </div>
      ${bubblesHtml}
      <div class="bubble-hint">👆 Click any bubble to hear the phrase in French</div>
    </div>
  `;
  return div;
}

function renderAll() {
  const wrap = document.getElementById('slides-wrap');
  SLIDES.forEach((s, si) => {
    wrap.appendChild(buildSlide(s, si));
    wrap.appendChild(buildBubbleSlide(s, si));
  });

  const dotsEl = document.getElementById('dots');
  for (let i = 0; i < TOTAL_SLIDES; i++) {
    const d = document.createElement('div');
    const isBubble = i % 2 === 1;
    d.className = 'dot' + (i === 0 ? ' active' : '') + (isBubble ? ' dot-scene' : '');
    d.title = isBubble ? `Scene ${Math.floor(i/2)+1}` : `Phrases ${Math.floor(i/2)+1}`;
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  }

  buildQuickRef();
}

// ═══════════════════════════════════════════
// NAVIGATION
// ═══════════════════════════════════════════
function goTo(idx) {
  window.speechSynthesis.cancel();
  document.getElementById('voice-toast').style.display = 'none';

  const slides = document.querySelectorAll('.slide');
  const dots   = document.querySelectorAll('.dot');

  slides[current].classList.remove('active');
  slides[current].classList.add('exit');
  setTimeout(() => slides[current].classList.remove('exit'), 380);

  current = idx;
  slides[current].classList.add('active');
  dots.forEach((d, i) => d.classList.toggle('active', i === current));

  const si = Math.floor(current / 2);
  const isBubble = current % 2 === 1;
  const pct = ((current + 1) / TOTAL_SLIDES * 100).toFixed(1);
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('prog-label').textContent =
    `Situation ${si + 1} of ${SLIDES.length}${isBubble ? ' · Scene' : ''}`;

  document.getElementById('prev-btn').disabled = current === 0;
  const nb = document.getElementById('next-btn');
  if (current === TOTAL_SLIDES - 1) {
    nb.textContent = '🏁 Bon voyage!';
    nb.disabled = true;
  } else {
    nb.textContent = 'Suivant →';
    nb.disabled = false;
  }

  document.getElementById('quiz-btn').style.visibility = isBubble ? 'hidden' : 'visible';
  if (!isBubble && quizMode) applyQuiz(true);
}

function navigate(dir) {
  const n = current + dir;
  if (n >= 0 && n < TOTAL_SLIDES) goTo(n);
}

// ═══════════════════════════════════════════
// QUIZ MODE
// ═══════════════════════════════════════════
function applyQuiz(on) {
  const _si = Math.floor(current / 2);
  document.querySelectorAll(`#slide-${_si*2} .phrase-card`).forEach(c => c.classList.toggle('quiz-hidden', on));
  const hint = document.getElementById(`qhint-${_si}`);
  if (hint) hint.style.visibility = on ? 'visible' : 'hidden';
}

function toggleQuiz() {
  quizMode = !quizMode;
  const btn = document.getElementById('quiz-btn');
  btn.textContent = quizMode ? '👁️ Show French' : '🙈 Quiz Me';
  btn.classList.toggle('active', quizMode);
  applyQuiz(quizMode);
}

// ═══════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') navigate(1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   navigate(-1);
  if (e.key === 'Escape') document.getElementById('ref-overlay').classList.remove('show');
});

renderAll();
</script>
</body>
</html>
